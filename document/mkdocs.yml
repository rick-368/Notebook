site_name: rick 的笔记本
repo_url: https://github.com/rick-368/Notebook
repo_name: rick/Notebook
theme:
  name: material
  icon:
    logo: material/cat # 页面左上角的图标
  language: zh # 语言

  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      toggle:
        icon: material/toggle-switch 
        name: 天黑请闭眼

    # Palette toggle for dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch-off-outline
        name: 天亮请睁眼

  features:
      #- navigation.instant # 现在页面不会跳转,而是类似单页应用,搜索和各种跳转都是在当前页面完成,对美观有很大帮助
      - navigation.tabs # 页面上方的标签页
      - navigation.tracking # 页面滚动时，导航栏高亮当前页面
      - navigation.sections # 使导航栏分块
      - navigation.prune # 只渲染当前页面的导航
      - navigation.top # 返回顶部按钮
      - search.suggest # 补全建议
      - search.highlight # 搜索结果高亮
      - search.share # 搜索结果分享
      - navigation.footer # 页脚提示下一章
      - content.code.copy # 代码段上的赋值按钮
      - navigation.indexes  # 关键特性：支持索引页面
      - navigation.expand  # 关键特性：支持展开子目录
  
